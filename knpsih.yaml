# ==========================================================
# Knpsih_clash
# ==========================================================

tproxy-port: 7895
redir-port: 7892
port: 7890
socks-port: 7891
mixed-port: 7893
bind-address: "*"
mode: rule
allow-lan: true
log-level: info
external-controller: 0.0.0.0:9090
unified-delay: true
ipv6: false
geodata-mode: true
geodata-loader: memconservative

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  
  # Bagian fix error Screenshot:
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - 1.1.1.1
    - 8.8.8.8

  nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
    - tls://1.1.1.1:853
    - tls://1.0.0.1:853
  fallback:
    - https://dns.google/dns-query
    - 8.8.8.8
    - 1.1.1.1
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - "+.tailscale.net"
  respect-rules: true

ntp:
  enable: true
  server: time.google.com
  port: 123
  interval: 15
  write-to-system: false

proxies: []

proxy-providers:
  ID:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20id.yaml"
    path: "./proxy_provider/id.yaml"
    interval: 3600
    health-check: {enable: true, interval: 600, url: http://www.gstatic.com/generate_204}
  SG:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20sg.yaml"
    path: "./proxy_provider/sg.yaml"
    interval: 3600
    health-check: {enable: true, interval: 600, url: http://www.gstatic.com/generate_204}
  Special:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20special.yaml"
    path: "./proxy_provider/special.yaml"
    interval: 3600
    health-check: {enable: true, interval: 600, url: http://www.gstatic.com/generate_204}
  Main:
    type: file
    path: "./akun_1.yaml"
    health-check: {enable: true, interval: 600, url: http://www.gstatic.com/generate_204}
  Backup:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%202.yaml"
    path: "./proxy_provider/akun2.yaml"
    interval: 3600
    health-check: {enable: true, interval: 600, url: http://www.gstatic.com/generate_204}

rule-providers:
  RP_Adblock:
    type: file
    behavior: classical
    path: ./rule_provider/adblock.yaml
  RP_Special:
    type: file
    behavior: classical
    path: "./rule_provider/special.yaml"
  RP_ID:
    type: file
    behavior: classical
    path: "./rule_provider/id.yaml"
  RP_SG:
    type: file
    behavior: classical
    path: "./rule_provider/sg.yaml"
  RP_Game:
    type: file
    behavior: classical
    path: "./rule_provider/gaming.yaml"
  RP_Umum:
    type: file
    behavior: classical
    path: "./rule_provider/umum.yaml"

proxy-groups:
  - name: LYCORIS
    type: select
    proxies: [My Traffic, ID, SG, DIRECT]
  - name: Ads
    type: select
    proxies: [REJECT, My Traffic]
  - name: Special
    type: fallback
    use: [Special]
  - name: Streaming
    type: fallback
    use: [Backup]
  - name: Game
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies: [DIRECT]
    use: [Special, SG]
  - name: Tailscale
    type: fallback
    proxies: [My Traffic, DIRECT]
  - name: SG
    type: fallback
    use: [SG]
  - name: ID
    type: fallback
    use: [ID, Backup]
  - name: My Traffic
    type: fallback
    use: [Main, Backup, ID, SG]

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - DOMAIN-KEYWORD,tailscale,Tailscale
  - GEOSITE,category-ads-all,Ads
  - RULE-SET,RP_Adblock,Ads
  - RULE-SET,RP_Game,Game
  - GEOSITE,facebook,Streaming
  - GEOSITE,tiktok,Streaming
  - GEOSITE,youtube,Streaming
  - GEOSITE,netflix,Streaming
  - GEOSITE,instagram,Special
  - GEOSITE,whatsapp,Special
  - GEOSITE,telegram,Special
  - RULE-SET,RP_ID,ID
  - RULE-SET,RP_SG,SG
  - RULE-SET,RP_Special,Special
  - RULE-SET,RP_Umum,My Traffic
  - MATCH,LYCORIS

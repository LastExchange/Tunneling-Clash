proxies:
proxy-providers:
  ID:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20id.yaml"
    path: "./proxy_provider/id.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  SG:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20sg.yaml"
    path: "./proxy_provider/sg.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Special:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20special.yaml"
    path: "./proxy_provider/special.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Main:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%201.yaml"
    path: "./proxy_provider/akun1.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Backup:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%202.yaml"
    path: "./proxy_provider/akun2.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

rule-providers:
  RP Special:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/special.yaml"
    path: "./rule_provider/special.yaml"
    interval: 86400
  RP ID:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/id.yaml"
    path: "./rule_provider/id.yaml"
    interval: 86400
  RP SG:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/sg.yaml"
    path: "./rule_provider/sg.yaml"
    interval: 86400
  RP Game:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/gaming.yaml"
    path: "./rule_provider/gaming.yaml"
    interval: 86400
  RP Umum:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/umum.yaml"
    path: "./rule_provider/umum.yaml"
    interval: 86400

proxy-groups:
- name: LYCORIS
  type: select
  proxies:
  - My Traffic
  - ID
  - SG
  - DIRECT
- name: Ads
  type: select
  proxies:
  - REJECT
  - My Traffic
- name: Special
  type: fallback
  use:
  - Special
- name: Streaming
  type: fallback
  use:
  - Backup
- name: Game
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  proxies:
  - DIRECT
  use:
  - Special
  - SG
- name: Tailscale
  type: fallback
  proxies:
  - My Traffic
  - DIRECT
- name: SG
  type: fallback
  use:
  - SG
- name: ID
  type: fallback
  use:
  - ID
  - Backup
- name: My Traffic
  type: fallback
  use:
  - Main
  - Backup
  - ID
  - SG

rules:
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- DOMAIN-KEYWORD,tailscale,Tailscale
- GEOSITE,category-ads-all,Ads
- RULE-SET,RP Game,Game
- GEOSITE,facebook,Streaming
- GEOSITE,tiktok,Streaming
- GEOSITE,youtube,Streaming
- GEOSITE,netflix,Streaming
- RULE-SET,RP ID,ID
- RULE-SET,RP SG,SG
- RULE-SET,RP Special,Special
- GEOSITE,whatsapp,Special
- GEOSITE,telegram,Special
- GEOSITE,instagram,Special
- RULE-SET,RP Umum,My Traffic
- MATCH,LYCORIS

    path: "./rule_provider/umum.yaml"

proxy-groups:
  - name: Ads
    type: select
    proxies:
      - REJECT
      - My Traffic

  - name: Special
    type: fallback
    lazy: true
    use:
      - Special

  - name: Gaming
    type: url-test
    url: https://ping.xmbb.net/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    use:
      - Special
      - ID
      - SG

  - name: SG
    type: fallback
    lazy: true
    use:
      - SG

  - name: ID
    type: fallback
    lazy: true
    use:
      - ID

  - name: All Traffic
    type: fallback
    lazy: true
    proxies:
      - My Traffic
      - ID
      - SG
      - DIRECT

  - name: My Traffic
    type: fallback
    lazy: true
    use:
      - SG
      - ID

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,192.168.1.0/24,DIRECT,no-resolve
  - IP-CIDR,192.168.2.0/24,DIRECT,no-resolve
  - IP-CIDR,192.168.8.0/24,DIRECT,no-resolve
  
  - AND,((NETWORK,udp),(DST-PORT,443)),REJECT 
  
  - DOMAIN-KEYWORD,tailscale,All Traffic

  - GEOSITE,category-ads-all,Ads
  - RULE-SET,Block,Ads
  
  - RULE-SET,Game,Gaming
  
  - RULE-SET,Facebook,SG
  - RULE-SET,Tiktok,SG
  - RULE-SET,Youtube,SG
  - RULE-SET,Instagram,ID
  - RULE-SET,Whatsapp,ID
  
  - RULE-SET,ID,ID
  - RULE-SET,SG,SG
  - RULE-SET,Google,SG
  
  - RULE-SET,Special,Special
  
  - RULE-SET,Umum,My Traffic
  
  - MATCH,My Traffic

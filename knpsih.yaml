# ==========================================================
# Knpsih_clash
# ==========================================================

tproxy-port: 9898
redir-port: 9797
port: 7890
socks-port: 7891
mixed-port: 7893
bind-address: "*"
mode: rule
allow-lan: true
log-level: info
external-controller: 0.0.0.0:9090
external-ui: ./dashboard
unified-delay: true
ipv6: false

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
  force-domain:
    - "+"

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:7874
  enhanced-mode: redir-host
  use-hosts: true
  respect-rules: true
  
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - https://1.1.1.1/dns-query
    
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    
  fallback:
    - 8.8.8.8
    - https://dns.google/dns-query

fallback-filter:
  geoip: true
  geoip-code: ID
  ipcidr:
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
  domain:
    - "+.google.com"
    - "+.facebook.com"
    - "+.youtube.com"
    - "+.githubusercontent.com"
    - "+.googlevideo.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.*"

ntp:
  enable: true
  server: time.google.com
  port: 123
  interval: 15
  
proxies:

proxy-providers:
  ID:
    type: file
    path: "./proxy_provider/akun id.yaml"
    health-check:
      enable: true
      interval: 600
      url: https://ping.xmbb.net/generate_204

  SG:
    type: file
    path: "./proxy_provider/akun sg.yaml"
    health-check:
      enable: true
      interval: 600
      url: https://ping.xmbb.net/generate_204

  Special:
    type: file
    path: "./proxy_provider/akun special.yaml"
    health-check:
      enable: true
      interval: 600
      url: https://ping.xmbb.net/generate_204
      
  Cek:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/cek.yaml"
    interval: 3600
    path: "./proxy_provider/cek.yaml"
    health-check:
      enable: true
      interval: 600
      url: https://ping.xmbb.net/generate_204

rule-providers:
  Block:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/block.yaml"
    interval: 3600

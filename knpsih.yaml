    path: "./rule_provider/game.yaml"

  Facebook:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/facebook.yaml"
    interval: 3600
    behavior: classical
    path: "./rule_provider/facebook.yaml"

  Tiktok:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/tiktok.yaml"
    interval: 3600
    behavior: classical
    path: "./rule_provider/tiktok.yaml"

  Youtube:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/youtube.yaml"
    interval: 3600
    behavior: classical
    path: "./rule_provider/youtube.yaml"

  Instagram:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/instagram.yaml"
    interval: 3600
    behavior: classical

# ==========================================================
# Knpsih_clash
# ==========================================================

tproxy-port: 7895
redir-port: 7892
port: 7890
socks-port: 7891
mixed-port: 7893
bind-address: "*"
mode: rule
allow-lan: true
log-level: info
external-controller: 0.0.0.0:9090
unified-delay: true
ipv6: false
geodata-mode: true
geodata-loader: memconservative

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - https://1.1.1.1/dns-query
    
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    
  nameserver:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
    - tls://1.1.1.1:853
    
  fallback:
    - https://dns.google/dns-query
    - 8.8.8.8
    
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.localhost"
    - "*.local"
    - "+.tailscale.net"

ntp:
  enable: true
  server: time.google.com
  port: 123
  interval: 15

proxies: []

proxy-providers:
  ID:
    type: file
    path: "./proxy_provider/akun id.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  SG:
    type: file
    path: "./proxy_provider/akun sg.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Special:
    type: file
    path: "./proxy_provider/akun special.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Main:
    type: file
    path: "./proxy_provider/akun 1.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Backup:
    type: file
    path: "./proxy_provider/akun 2.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

rule-providers:
  RP Adblock:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/adblock.yaml"
    path: "./rule_provider/adblock.yaml"
    interval: 86400
  RP Special:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/special.yaml"
    path: "./rule_provider/special.yaml"
    interval: 86400
  RP ID:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/id.yaml"
    path: "./rule_provider/id.yaml"
    interval: 86400
  RP SG:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/sg.yaml"
    path: "./rule_provider/sg.yaml"
    interval: 86400
  RP Game:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/gaming.yaml"
    path: "./rule_provider/gaming.yaml"
    interval: 86400
  RP Umum:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/rule_provider/umum.yaml"
    path: "./rule_provider/umum.yaml"
    interval: 86400

proxy-groups:
  - name: LYCORIS
    type: select
    proxies:
      - My Traffic
      - ID
      - SG
      - DIRECT

  - name: Ads
    type: select
    proxies:
      - REJECT
      - My Traffic

  - name: Special
    type: fallback
    lazy: true
    use:
      - Special

  - name: Streaming
    type: fallback
    lazy: true
    use:
      - Backup

  - name: Game
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies:
      - DIRECT
    use:
      - Special
      - SG

  - name: SG
    type: fallback
    lazy: true
    use:
      - SG

  - name: ID
    type: fallback
    lazy: true
    use:
      - ID
      - Backup

  - name: My Traffic
    type: fallback
    lazy: true
    use:
      - Main
      - Backup
      - ID
      - SG

rules:
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - DOMAIN-KEYWORD,tailscale,LYCORIS
  - GEOSITE,category-ads-all,Ads
  - RULE-SET,RP Adblock,Ads
  - RULE-SET,RP Game,Game
  - GEOSITE,facebook,Streaming
  - GEOSITE,tiktok,Streaming
  - GEOSITE,youtube,Streaming
  - GEOSITE,netflix,Streaming
  - GEOSITE,instagram,Special
  - GEOSITE,whatsapp,Special
  - GEOSITE,telegram,Special
  - RULE-SET,RP ID,ID
  - RULE-SET,RP SG,SG
  - RULE-SET,RP Special,Special
  - RULE-SET,RP Umum,My Traffic
  - MATCH,LYCORIS

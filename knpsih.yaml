tproxy-port: 7895
redir-port: 7892
port: 7890
socks-port: 7891
mixed-port: 7893
bind-address: "*"
mode: rule
allow-lan: true
log-level: silent
external-controller: 0.0.0.0:9090
unified-delay: true
ipv6: false
geodata-mode: true
geodata-loader: memconservative
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
  fallback:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query
  - 114.114.114.114
  fake-ip-filter:
  - "*.lan"
  - "*.localdomain"
  - "*.example"
  - "*.invalid"
  - "*.localhost"
  - "*.test"
  - "*.local"
  - "*.home.arpa"
  respect-rules: false
ntp:
  enable: true
  server: time.google.com
  port: 123
  interval: 15
  write-to-system: false
proxies:
proxy-providers:
  ID:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20id.yaml"
    path: "./proxy_provider/id.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  SG:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20sg.yaml"
    path: "./proxy_provider/sg.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Special:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%20special.yaml"
    path: "./proxy_provider/special.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Main:
    type: file
    path: "./akun 1.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Backup:
    type: http
    url: "https://raw.githubusercontent.com/LastExchange/Tunneling-Clash/refs/heads/main/proxy_provider/akun%202.yaml"
    path: "./proxy_provider/akun2.yaml"
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Backup:
    type: file
    path: "./proxy_provider/akun 2.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
rule-providers:
  RP Adblock:
    type: file
    behavior: classical
    path: ./rule_provider/adblock.yaml
  RP Special:
    type: file
    behavior: classical
    path: "./rule_provider/special.yaml"
  RP ID:
    type: file
    behavior: classical
    path: "./rule_provider/id.yaml"
  RP SG:
    type: file
    behavior: classical
    path: "./rule_provider/sg.yaml"
  RP Game:
    type: file
    behavior: classical
    path: "./rule_provider/gaming.yaml"
  RP Umum:
    type: file
    behavior: classical
    path: "./rule_provider/umum.yaml"
proxy-groups:
- name: LYCORIS
  type: select
  proxies:
  - My Traffic
  - ID
  - SG
  - DIRECT
- name: Ads
  type: select
  proxies:
  - REJECT
  - My Traffic
- name: Special
  type: fallback
  use:
  - Special
- name: Streaming
  type: fallback
  use:
  - Backup
- name: Game
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  proxies:
  - DIRECT
  use:
  - Special
  - SG
- name: Tailscale
  type: fallback
  proxies:
  - My Traffic
  - DIRECT
- name: SG
  type: fallback
  use:
  - SG
- name: ID
  type: fallback
  use:
  - ID
  - Backup
- name: My Traffic
  type: fallback
  use:
  - Main
  - Backup
  - ID
  - SG
rules:
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- DOMAIN-KEYWORD,tailscale,Tailscale
- GEOSITE,category-ads-all,Ads
- RULE-SET,RP Adblock,Ads
- RULE-SET,RP Game,Game
- GEOSITE,facebook,Streaming
- GEOSITE,tiktok,Streaming
- GEOSITE,youtube,Streaming
- GEOSITE,netflix,Streaming
- RULE-SET,RP ID,ID
- RULE-SET,RP SG,SG
- RULE-SET,RP Special,Special
- GEOSITE,whatsapp,Special
- GEOSITE,telegram,Special
- GEOSITE,instagram,Special
- RULE-SET,RP Umum,My Traffic
- MATCH,LYCORIS

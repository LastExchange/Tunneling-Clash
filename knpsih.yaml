proxies:
proxy-providers:
  ID:
    type: file
    path: "./akun id.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  SG:
    type: file
    path: "./akun sg.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Special:
    type: file
    path: "./akun special.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Main:
    type: file
    path: "./akun 1.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
  Backup:
    type: file
    path: "./akun 2.yaml"
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
rule-providers:
  RP Special:
    type: file
    behavior: classical
    path: "./special.yaml"
  RP ID:
    type: file
    behavior: classical
    path: "./id.yaml"
  RP SG:
    type: file
    behavior: classical
    path: "./sg.yaml"
  RP Game:
    type: file
    behavior: classical
    path: "./gaming.yaml"
  RP Umum:
    type: file
    behavior: classical
    path: "./umum.yaml"
proxy-groups:
- name: LYCORIS
  type: select
  proxies:
  - My Traffic
  - ID
  - SG
  - DIRECT
- name: Ads
  type: select
  proxies:
  - REJECT
  - My Traffic
- name: Special
  type: fallback
  use:
  - Special
- name: Streaming
  type: fallback
  use:
  - Backup
- name: Game
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
  proxies:
  - DIRECT
  use:
  - Special
  - SG
- name: Tailscale
  type: fallback
  proxies:
  - My Traffic
  - DIRECT
- name: SG
  type: fallback
  use:
  - SG
- name: ID
  type: fallback
  use:
  - ID
  - Backup
- name: My Traffic
  type: fallback
  use:
  - Main
  - Backup
  - ID
  - SG
rules:
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
- DOMAIN-KEYWORD,tailscale,Tailscale
- GEOSITE,category-ads-all,Ads
- RULE-SET,RP Game,Game
- GEOSITE,facebook,Streaming
- GEOSITE,tiktok,Streaming
- GEOSITE,youtube,Streaming
- GEOSITE,netflix,Streaming
- RULE-SET,RP ID,ID
- RULE-SET,RP SG,SG
- RULE-SET,RP Special,Special
- GEOSITE,whatsapp,Special
- GEOSITE,telegram,Special
- GEOSITE,instagram,Special
- RULE-SET,RP Umum,My Traffic
- MATCH,LYCORIS